<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MomFlix - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #eee;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            background: #181818;
            border-radius: 8px;
            padding: 40px;
            width: 300px;
            text-align: center;
            border: 1px solid #333;
        }
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #e50914;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #333;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #e50914;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #b8070f;
        }
        .error {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">MomFlix</div>
        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="username">Usuário:</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
            <div id="error" class="error" style="display:none;"></div>
        </form>
    </div>

    <script>
        // Verificar se já está logado
        fetch('api/check_admin.php')
            .then(r => r.json())
            .then(result => {
                if (result.isLoggedIn) {
                    window.location.href = 'index.php';
                }
            });
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            fetch('login.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, password: password})
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    window.location.href = 'index.php';
                } else {
                    document.getElementById('error').textContent = result.error || 'Erro no login';
                    document.getElementById('error').style.display = 'block';
                }
            })
            .catch(error => {
                document.getElementById('error').textContent = 'Erro de conexão';
                document.getElementById('error').style.display = 'block';
            });
        });
    </script>
</body>
</html>
