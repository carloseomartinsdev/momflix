<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste SSE - MomFlix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #141414; 
            color: #fff; 
            padding: 20px; 
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; color: #e50914; }
        .section { 
            background: #222; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
        }
        .status { 
            padding: 10px; 
            border-radius: 4px; 
            margin-bottom: 10px; 
        }
        .status.connected { background: #0f5132; }
        .status.disconnected { background: #842029; }
        .controls { margin: 20px 0; }
        button { 
            background: #e50914; 
            color: #fff; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 4px; 
            cursor: pointer; 
            margin-right: 10px; 
        }
        button:hover { background: #f40612; }
        input { 
            padding: 8px; 
            border-radius: 4px; 
            border: 1px solid #444; 
            background: #333; 
            color: #fff; 
            margin-right: 10px; 
        }
        .log { 
            background: #000; 
            padding: 15px; 
            border-radius: 4px; 
            max-height: 400px; 
            overflow-y: auto; 
            font-family: monospace; 
            font-size: 12px; 
        }
        .log-entry { 
            padding: 5px 0; 
            border-bottom: 1px solid #333; 
        }
        .log-entry.player { color: #4CAF50; }
        .log-entry.chat { color: #2196F3; }
        .log-entry.participantes { color: #FF9800; }
        .log-entry.error { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Teste SSE - Server-Sent Events</h1>
        
        <div class="section">
            <h2>Status da Conexão</h2>
            <div id="status" class="status disconnected">Desconectado</div>
        </div>

        <div class="section">
            <h2>Controles</h2>
            <div class="controls">
                <label>ID da Sala:</label>
                <input type="number" id="salaId" value="1" min="1">
                <button onclick="conectar()">Conectar</button>
                <button onclick="desconectar()">Desconectar</button>
                <button onclick="limparLog()">Limpar Log</button>
            </div>
        </div>

        <div class="section">
            <h2>Log de Eventos</h2>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        let eventSource = null;

        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function conectar() {
            if (eventSource) {
                addLog('Já existe uma conexão ativa', 'error');
                return;
            }

            const salaId = document.getElementById('salaId').value;
            if (!salaId) {
                addLog('ID da sala é obrigatório', 'error');
                return;
            }

            addLog(`Conectando à sala ${salaId}...`, 'info');
            eventSource = new EventSource(`api/sse_sala.php?sala_id=${salaId}`);

            eventSource.onopen = () => {
                document.getElementById('status').className = 'status connected';
                document.getElementById('status').textContent = `Conectado à sala ${salaId}`;
                addLog('Conexão estabelecida!', 'info');
            };

            eventSource.addEventListener('player', (e) => {
                const data = JSON.parse(e.data);
                addLog(`PLAYER: tempo=${data.tempo_atual}s, pausado=${data.pausado}`, 'player');
            });

            eventSource.addEventListener('chat', (e) => {
                const data = JSON.parse(e.data);
                addLog(`CHAT: [${data.username}] ${data.mensagem}`, 'chat');
            });

            eventSource.addEventListener('participantes', (e) => {
                const data = JSON.parse(e.data);
                addLog(`PARTICIPANTES: ${data.length} online`, 'participantes');
            });

            eventSource.onerror = (e) => {
                addLog('Erro na conexão SSE', 'error');
                desconectar();
            };
        }

        function desconectar() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                document.getElementById('status').className = 'status disconnected';
                document.getElementById('status').textContent = 'Desconectado';
                addLog('Conexão encerrada', 'info');
            }
        }

        function limparLog() {
            document.getElementById('log').innerHTML = '';
        }

        window.addEventListener('beforeunload', () => {
            if (eventSource) {
                eventSource.close();
            }
        });
    </script>
</body>
</html>
